name: Android CI with Release New

on:
  push:
    tags:
      - 'v*' # 仅在推送以 v 开头的标签时触发发布（例如 v1.0.0）
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Source/Android

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission
      run: chmod +x gradlew

    - name: Build Release APK
      run: ./gradlew assembleRelease

    # 1. 导出构建产物
    - name: Upload APK as artifact
      uses: actions/upload-artifact@v4
      with:
        name: release-apk
        path: Source/Android/app/build/outputs/apk/release/app-release.apk

  # 2. 发布任务
  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') # 仅当存在标签时运行
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: release-apk

      - name: Release to GitHub
        uses: softprops/action-gh-release@v2
        with:
          files: app-release.apk
          token: ${{ secrets.GITHUB_TOKEN }} # GitHub 自动提供
