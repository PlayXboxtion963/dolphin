name: Android CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Source/Android

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive # 关键点：递归拉取所有外部依赖
        fetch-depth: 0        # 建议设为 0，拉取所有历史记录，避免某些脚本报错
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission
      run: chmod +x gradlew

    - name: Build Release APK
      run: ./gradlew assembleRelease

    # 1. 导出构建产物
    - name: Upload APK as artifact
      uses: actions/upload-artifact@v4
      with:
        name: release-apk
        path: Source/Android/app/build/outputs/apk/release/app-release.apk

  # 2. 发布任务
  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') # 仅当存在标签时运行
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: release-apk

      - name: Release to GitHub
        uses: softprops/action-gh-release@v2
        with:
          files: app-release.apk
          token: ${{ secrets.GITHUB_TOKEN }} # GitHub 自动提供
